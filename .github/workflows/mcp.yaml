name: AWS LightSail DockerHub Deployment

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ 코드 체크아웃
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3️⃣ Docker Hub 로그인
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 4️⃣ Docker 이미지 빌드 & 푸시
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./welfare_mcp
          push: true
          tags: |
            jinnyzinny/welfare-mcp:latest
            jinnyzinny/welfare-mcp:${{ github.sha }}
          # 🔥 GHA 캐시 적용
          cache-from: type=gha,scope=server
          cache-to: type=gha,mode=max,scope=server

      # 5️⃣ SSH 설정
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.LIGHTSAIL_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.LIGHTSAIL_HOST }} >> ~/.ssh/known_hosts

      # 6️⃣ Batch 이미지 빌드 & 푸시 (상시 사용하진 않고 수동으로 배치 작업 돌릴 때 사용)
      - name: Build & Push Batch Image
        uses: docker/build-push-action@v5
        with:
          context: ./batch
          push: true
          tags: |
            jinnyzinny/welfare-batch:latest
            jinnyzinny/welfare-batch:${{ github.sha }}

      # 7️⃣ LightSail 배포
      - name: Deploy to LightSail
        run: |
          ssh ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }} << 'EOF'
          set -e
          cd /home/ubuntu/app

          docker-compose pull
          docker-compose up -d server postgres

          # 🔥 핵심: nginx만 재시작
          docker-compose restart nginx

          docker ps
          EOF
