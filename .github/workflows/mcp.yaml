name: AWS LightSail DockerHub Deployment

on:
  push:
    branches:
      - master

jobs:
  build-server:
    runs-on: ubuntu-latest
    steps:
      # 1️⃣ 코드 체크아웃
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3️⃣ Docker Hub 로그인
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      # 4️⃣ Docker 이미지 빌드 & 푸시
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./welfare_mcp
          push: true
          tags: |
            jinnyzinny/welfare-mcp:latest
            jinnyzinny/welfare-mcp:${{ github.sha }}
          # 🔥 GHA 캐시 적용
          cache-from: type=gha,scope=server
          cache-to: type=gha,mode=max,scope=server

  build-batch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Batch Image
        uses: docker/build-push-action@v5
        with:
          context: ./batch
          push: true
          tags: |
            jinnyzinny/welfare-batch:latest
            jinnyzinny/welfare-batch:${{ github.sha }}
          cache-from: type=gha,scope=batch
          cache-to: type=gha,mode=max,scope=batch

  build-normalize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Normalize Image
        uses: docker/build-push-action@v5
        with:
          context: ./normalize
          push: true
          tags: |
            jinnyzinny/welfare-normalize:latest
            jinnyzinny/welfare-normalize:${{ github.sha }}
          cache-from: type=gha,scope=normalize
          cache-to: type=gha,mode=max,scope=normalize

